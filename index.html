<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="Tic Tac Toe.png">
  <title>LEON Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 25% 15%, #3D1573 0%, #1A0533 50%, #0D1B4A 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── STARS ─── */
    #stars, #floaters {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .star {
      position: absolute; border-radius: 50%; background: #fff; opacity: 0;
      animation: twinkle var(--d) ease-in-out infinite var(--dl);
    }
    @keyframes twinkle {
      0%,100%{ opacity:0; transform:scale(0.5); }
      50%    { opacity:var(--br); transform:scale(1); }
    }
    .floater {
      position: absolute; opacity: 0.09; font-size: var(--fs);
      animation: bob var(--d) ease-in-out infinite var(--dl);
    }
    @keyframes bob {
      0%,100%{ transform:translateY(0) rotate(0deg); }
      50%    { transform:translateY(-18px) rotate(8deg); }
    }

    /* ─── CONFETTI ─── */
    #confetti { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
    .cp {
      position: absolute; top: -16px; border-radius: 2px;
      animation: fall var(--cd) ease-in var(--cdl) both;
    }
    @keyframes fall {
      0%  { transform: translateY(0) translateX(0) rotate(0deg);    opacity:1; }
      100%{ transform: translateY(110vh) translateX(var(--cx)) rotate(600deg); opacity:0; }
    }

    /* ─── WIN POPUP ─── */
    #winPop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(5,0,20,0.75); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    #winPop.show { display: flex; }
    .pop-box {
      background: linear-gradient(160deg,#280A50,#140228);
      border: 2px solid rgba(255,202,40,0.55);
      border-radius: 28px; padding: 36px 32px;
      text-align: center; max-width: 320px; width: 90%;
      box-shadow: 0 24px 70px rgba(0,0,0,0.9);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      0%  { transform:scale(0.55) rotate(-6deg); opacity:0; }
      100%{ transform:scale(1) rotate(0deg);     opacity:1; }
    }
    #popEmoji  { font-size: 4.5rem; display:block; animation: bop 0.7s ease infinite alternate; }
    @keyframes bop { to { transform:translateY(-12px); } }
    #popTitle  {
      font-family:'Fredoka One',cursive; font-size:2.2rem;
      background:linear-gradient(135deg,#FFCA28,#FF4081);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      margin: 8px 0 4px;
    }
    #popSub    { font-size:0.95rem; color:rgba(255,255,255,0.6); font-weight:700; margin-bottom:24px; }
    .pop-btn   {
      font-family:'Fredoka One',cursive; font-size:1.1rem;
      background:linear-gradient(135deg,#FFCA28,#FF6F00); color:#3A1C00;
      border:none; border-radius:50px; padding:12px 32px; cursor:pointer;
      box-shadow:0 5px 0 rgba(0,0,0,0.3); transition:transform .15s,box-shadow .15s;
    }
    .pop-btn:hover  { transform:translateY(-2px); box-shadow:0 8px 0 rgba(0,0,0,0.25); }
    .pop-btn:active { transform:translateY(2px);  box-shadow:0 2px 0 rgba(0,0,0,0.2); }

    /* ─── MAIN LAYOUT ─── */
    /*
      Desktop: LEFT scoreboard | CENTER game card
      All fitted to 100vh — NO scrolling
    */
    .wrap {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 18px;
      align-items: center;
      width: 100%;
      max-width: 640px;
      height: 100vh;
      padding: 16px;
    }

    /* ─── SCOREBOARD ─── */
    .scores {
      display: flex; flex-direction: column;
      gap: 10px; height: 100%;
      justify-content: center;
    }
    .sc {
      background: rgba(255,255,255,0.07);
      border: 2px solid transparent;
      border-radius: 18px; padding: 14px 10px;
      text-align: center; backdrop-filter: blur(6px);
      transition: border-color .3s, transform .3s, background .3s;
    }
    .sc.lit {
      border-color: #FFCA28; transform: translateX(-4px);
      background: rgba(255,202,40,0.13);
    }
    .sc-icon { font-size: 1.7rem; display:block; line-height:1; margin-bottom:3px; }
    .sc-name {
      font-family:'Fredoka One',cursive; font-size:0.7rem;
      color:rgba(255,255,255,0.6); letter-spacing:1.2px; text-transform:uppercase;
    }
    .sc-val {
      font-family:'Fredoka One',cursive; font-size:2rem; line-height:1.1;
    }
    .sc.p1 .sc-val { color:#FF7043; }
    .sc.p2 .sc-val { color:#42A5F5; }
    .sc.dr .sc-val { color:#FFCA28; }
    .sc.dr .sc-icon { font-size:1.3rem; }

    /* ─── GAME CARD ─── */
    .card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 28px 56px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12);

      /* Fill height, flex column so children share space */
      height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      padding: 18px 18px 16px;
      overflow: hidden;
    }

    /* ─── TITLE ─── */
    .title {
      text-align: center; flex-shrink: 0; margin-bottom: 10px;
    }
    .title h1 {
      font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,3.5vh,2.6rem);
      background:linear-gradient(135deg,#FFCA28,#FF6F00,#FF4081,#CE93D8);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      line-height: 1;
    }
    .title p {
      font-size: 0.7rem; font-weight:700; letter-spacing:2px;
      text-transform:uppercase; color:rgba(255,255,255,0.4);
      margin-top:3px;
    }

    /* ─── STATUS ─── */
    .status {
      flex-shrink: 0;
      background: rgba(0,0,0,0.3); border-radius:50px;
      border: 2px solid rgba(255,255,255,0.08);
      padding: 8px 18px; margin-bottom: 12px;
      text-align:center;
      transition: background .3s, border-color .3s;
    }
    .status p {
      font-family:'Fredoka One',cursive; font-size:clamp(1rem,2.2vh,1.25rem);
      color:#fff;
    }
    .status.wx { background:rgba(255,112,67,0.22); border-color:#FF7043; }
    .status.wo { background:rgba(66,165,245,0.22); border-color:#42A5F5; }
    .status.wd { background:rgba(255,202,40,0.18); border-color:#FFCA28; }

    /* ─── BOARD ─── */
    .board {
      flex: 1;          /* takes ALL remaining space between status & buttons */
      min-height: 0;    /* crucial: lets flex child shrink below content size */
      display: grid;
      grid-template-columns: repeat(3,1fr);
      grid-template-rows:    repeat(3,1fr);
      gap: 10px;
      background: rgba(0,0,0,0.28);
      border-radius: 20px; padding: 10px;
      border: 2px solid rgba(255,255,255,0.06);
      margin-bottom: 12px;
    }

    /* ─── CELLS ─── */
    .cell {
      background: linear-gradient(145deg,#FFFFFF,#F0EEF8);
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      box-shadow: 0 5px 0 rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .12s, background .12s;
      transform: translateY(-2px);
      position: relative; overflow: hidden;
      width:100%; height:100%;  /* fill the grid cell */
    }
    .cell:hover:not(.taken) {
      transform:translateY(-5px);
      background:#FFFDE7;
      box-shadow:0 10px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .cell:active:not(.taken) {
      transform:translateY(2px);
      box-shadow:0 2px 0 rgba(0,0,0,0.15);
    }
    .cell.taken { cursor:default; }

    /* hover ghost hints */
    .cell.hx::before,
    .cell.ho::before {
      position:absolute; font-family:'Fredoka One',cursive;
      font-size:clamp(1.6rem,4vw,3rem); line-height:1; pointer-events:none;
    }
    .cell.hx::before { content:'✕'; color:rgba(230,74,25,0.18); }
    .cell.ho::before { content:'○'; color:rgba(21,101,192,0.18); }

    /* X / O colors */
    .cell[data-v="X"] { background:linear-gradient(145deg,#FFF3F0,#FFE0D6); }
    .cell[data-v="O"] { background:linear-gradient(145deg,#EFF6FF,#D6EAFF); }

    .sym {
      font-family:'Fredoka One',cursive;
      font-size: clamp(1.6rem, 5vh, 3.2rem);
      line-height:1; display:block;
      animation: pop .2s cubic-bezier(.34,1.56,.64,1) both;
    }
    .cell[data-v="X"] .sym { color:#E64A19; }
    .cell[data-v="O"] .sym { color:#1565C0; }

    @keyframes pop {
      0%  { transform:scale(0) rotate(-20deg); opacity:0; }
      100%{ transform:scale(1) rotate(0deg);   opacity:1; }
    }

    /* winning glow */
    .cell.win {
      animation: glow .55s ease forwards;
      box-shadow: 0 0 0 3px #FFCA28, 0 0 0 6px rgba(255,202,40,0.35);
    }
    @keyframes glow {
      0%  { transform:scale(1); }
      40% { transform:scale(1.1); }
      70% { transform:scale(0.96); }
      100%{ transform:scale(1.04); }
    }

    /* ─── BUTTONS ─── */
    .btns {
      flex-shrink: 0;
      display: flex; gap: 10px; justify-content: center;
    }
    .btn {
      font-family:'Fredoka One',cursive; border:none; border-radius:50px;
      cursor:pointer; letter-spacing:.5px;
      box-shadow:0 5px 0 rgba(0,0,0,0.3);
      transition:transform .15s, box-shadow .15s, filter .15s;
      font-size: clamp(0.85rem,1.8vh,1rem);
      padding: clamp(9px,1.5vh,13px) clamp(18px,2.5vw,26px);
    }
    .btn:hover  { transform:translateY(-2px); filter:brightness(1.1); box-shadow:0 8px 0 rgba(0,0,0,0.22); }
    .btn:active { transform:translateY(2px);  box-shadow:0 2px 0 rgba(0,0,0,0.2); }
    .btn-play   { background:linear-gradient(135deg,#FFCA28,#FF6F00); color:#3A1C00; flex:1; }
    .btn-reset  {
      background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.7); font-size:clamp(0.75rem,1.5vh,0.9rem);
    }
    .btn-reset:hover { background:rgba(255,255,255,0.2); color:#fff; }

    /* ─── FOOTER ─── */
    .foot {
      flex-shrink:0; text-align:center; margin-top:8px;
      font-size:0.6rem; color:rgba(255,255,255,0.2);
      font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    }

    /* ─── MOBILE : stack layout ─── */
    @media (max-width:620px) {
      html, body { overflow: auto; }
      .wrap {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto; min-height:100vh;
        padding: 14px 12px 20px;
        gap: 12px;
      }
      .scores {
        flex-direction: row;
        height: auto; justify-content: stretch;
      }
      .sc { flex:1; }
      .sc.lit { transform: translateY(-3px); }
      .card {
        height: auto;
        flex: none;
      }
      .board {
        /* fixed square on mobile */
        aspect-ratio: 1;
        flex: none;
      }
    }

    @media (prefers-reduced-motion:reduce) {
      *, .cell, .btn { animation:none !important; transition:none !important; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="floaters"></div>
<div id="confetti"></div>

<!-- WIN POPUP -->
<div id="winPop">
  <div class="pop-box">
    <span id="popEmoji">🏆</span>
    <div  id="popTitle">Amazing!</div>
    <div  id="popSub">Player 1 wins!</div>
    <button class="pop-btn" id="popBtn">▶ Play Again</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="wrap">

  <!-- LEFT: scoreboard -->
  <div class="scores">
    <div class="sc p1 lit" id="sc1">
      <span class="sc-icon">✕</span>
      <div class="sc-name">Player 1</div>
      <div class="sc-val"  id="s1">0</div>
    </div>
    <div class="sc dr" id="scD">
      <span class="sc-icon">🤝</span>
      <div class="sc-name">Draws</div>
      <div class="sc-val"  id="sD">0</div>
    </div>
    <div class="sc p2" id="sc2">
      <span class="sc-icon">○</span>
      <div class="sc-name">Player 2</div>
      <div class="sc-val"  id="s2">0</div>
    </div>
  </div>

  <!-- RIGHT: game card -->
  <div class="card">

    <div class="title">
      <h1>Tic Tac Toe</h1>
      <p>✦ Classic 2-Player ✦</p>
    </div>

    <div class="status" id="status">
      <p id="statusMsg">✕ Player 1's Turn!</p>
    </div>

    <div class="board" id="board"></div>

    <div class="btns">
      <button class="btn btn-play"  id="btnNew">⟳ New Round</button>
      <button class="btn btn-reset" id="btnReset">🗑 Reset Scores</button>
    </div>

    <div class="foot">made for little champions ⭐</div>

  </div>
</div>

<script>
(function(){
  /* ── constants ── */
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const P = {
    X:{ sym:'✕', label:'Player 1' },
    O:{ sym:'○', label:'Player 2' }
  };
  const HYPE  = ['Amazing!','Brilliant!','Nice!','Sultan!','Incredible!','Legendary!'];
  const DRAWS = ['So Close!','Great Try!','Nice Game!','Almost There!'];
  const WEMJ  = ['🏆','🎉','⭐','🌟','🥇','👑'];
  const DEMJ  = ['🤝','⚖️','🫂','🎊'];
  const CCOLS = ['#FFCA28','#FF4081','#42A5F5','#66BB6A','#CE93D8','#FF7043','#80DEEA'];

  /* ── state ── */
  let board = Array(9).fill('');
  let cur   = 'X';
  let live  = true;
  let score = { X:0, O:0, D:0 };

  /* ── DOM refs ── */
  const boardEl  = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const msgEl    = document.getElementById('statusMsg');
  const s1El     = document.getElementById('s1');
  const s2El     = document.getElementById('s2');
  const sDEl     = document.getElementById('sD');
  const sc1      = document.getElementById('sc1');
  const sc2      = document.getElementById('sc2');
  const winPop   = document.getElementById('winPop');
  const popEmoji = document.getElementById('popEmoji');
  const popTitle = document.getElementById('popTitle');
  const popSub   = document.getElementById('popSub');
  const popBtn   = document.getElementById('popBtn');
  const confEl   = document.getElementById('confetti');

  /* ── helpers ── */
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function setMsg(txt, mod=''){
    msgEl.textContent  = txt;
    statusEl.className = 'status ' + mod;
  }

  function highlightTurn(){
    sc1.classList.toggle('lit', cur==='X' && live);
    sc2.classList.toggle('lit', cur==='O' && live);
  }

  function updateScores(){
    s1El.textContent = score.X;
    s2El.textContent = score.O;
    sDEl.textContent = score.D;
  }

  /* ── board building ── */
  function buildBoard(){
    boardEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const c = document.createElement('button');
      c.className = 'cell';
      c.dataset.i = i;
      c.setAttribute('aria-label','Cell '+(i+1));
      c.addEventListener('click',  onClick);
      c.addEventListener('mouseenter', onIn);
      c.addEventListener('mouseleave', onOut);
      boardEl.appendChild(c);
    }
  }

  function cells(){ return boardEl.querySelectorAll('.cell'); }

  function render(){
    cells().forEach((c,i)=>{
      const v = board[i];
      c.dataset.v  = v || '';
      c.classList.toggle('taken', !!v);
      c.innerHTML  = v ? `<span class="sym">${P[v].sym}</span>` : '';
    });
  }

  /* ── game logic ── */
  function checkWin(){
    for(const [a,b,c] of WINS)
      if(board[a] && board[a]===board[b] && board[a]===board[c])
        return { w:board[a], combo:[a,b,c] };
    return null;
  }

  function onClick(e){
    const i = +e.currentTarget.dataset.i;
    if(!live || board[i]) return;
    board[i] = cur;
    render();

    const res = checkWin();
    if(res){ doWin(res.w, res.combo); return; }
    if(board.every(v=>v)){ doDraw(); return; }

    cur = cur==='X'?'O':'X';
    highlightTurn();
    setMsg(`${P[cur].sym} ${P[cur].label}'s Turn!`);
  }

  function onIn(e){
    if(!live) return;
    const c = e.currentTarget;
    if(board[+c.dataset.i]) return;
    c.classList.add(cur==='X'?'hx':'ho');
  }
  function onOut(e){
    e.currentTarget.classList.remove('hx','ho');
  }

  function doWin(w, combo){
    live = false;
    score[w]++;
    updateScores();
    // highlight winning cells
    const cs = cells();
    combo.forEach(i=>cs[i].classList.add('win'));
    setMsg(`🏆 ${P[w].label} Wins!`, w==='X'?'wx':'wo');
    sc1.classList.remove('lit');
    sc2.classList.remove('lit');
    // popup
    setTimeout(()=>{
      popEmoji.textContent = pick(WEMJ);
      popTitle.textContent = pick(HYPE);
      popSub.textContent   = `${P[w].label} wins this round! 🎉`;
      winPop.classList.add('show');
      confetti();
    }, 420);
  }

  function doDraw(){
    live = false;
    score.D++;
    updateScores();
    setMsg("🤝 It's a Draw!", 'wd');
    sc1.classList.remove('lit');
    sc2.classList.remove('lit');
    setTimeout(()=>{
      popEmoji.textContent = pick(DEMJ);
      popTitle.textContent = pick(DRAWS);
      popSub.textContent   = 'Nobody won — great match!';
      winPop.classList.add('show');
    }, 340);
  }

  function newRound(start='X'){
    board  = Array(9).fill('');
    cur    = start;
    live   = true;
    winPop.classList.remove('show');
    confEl.innerHTML = '';
    buildBoard();
    render();
    setMsg(`${P[cur].sym} ${P[cur].label}'s Turn!`);
    highlightTurn();
  }

  function resetAll(){
    score = { X:0, O:0, D:0 };
    updateScores();
    newRound('X');
  }

  /* ── confetti ── */
  function confetti(){
    confEl.innerHTML = '';
    for(let i=0;i<80;i++){
      const el   = document.createElement('div');
      el.className = 'cp';
      const sz   = 6 + Math.random()*10;
      const cx   = (Math.random()-.5)*180;
      el.style.cssText = `
        left:${Math.random()*100}%;
        background:${CCOLS[i%CCOLS.length]};
        width:${sz}px; height:${sz}px;
        border-radius:${Math.random()>.5?'50%':'3px'};
        --cd:${(1.5+Math.random()*1.8).toFixed(2)}s;
        --cdl:${(Math.random()*.6).toFixed(2)}s;
        --cx:${cx}px;
      `;
      confEl.appendChild(el);
    }
    setTimeout(()=>confEl.innerHTML='', 4000);
  }

  /* ── background fx ── */
  function buildStars(){
    const c = document.getElementById('stars');
    for(let i=0;i<80;i++){
      const s = document.createElement('div');
      s.className = 'star';
      const sz = 1+Math.random()*2.5;
      s.style.cssText=`
        width:${sz}px; height:${sz}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --d:${(2+Math.random()*4).toFixed(1)}s;
        --dl:-${(Math.random()*5).toFixed(1)}s;
        --br:${(.4+Math.random()*.6).toFixed(2)};
      `;
      c.appendChild(s);
    }
  }

  function buildFloaters(){
    const c = document.getElementById('floaters');
    const em = ['🎈','⭐','🎀','✨','⛺','🕌','📔','🃏','💫','🎯','🌟','🎪'];
    for(let i=0;i<12;i++){
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = em[i%em.length];
      el.style.cssText=`
        top:${5+Math.random()*88}%; left:${2+Math.random()*92}%;
        --fs:${(1.8+Math.random()*2.4).toFixed(1)}rem;
        --d:${(5+Math.random()*8).toFixed(1)}s;
        --dl:-${(Math.random()*5).toFixed(1)}s;
      `;
      c.appendChild(el);
    }
  }

  /* ── events ── */
  document.getElementById('btnNew').addEventListener('click', ()=>newRound('X'));
  document.getElementById('btnReset').addEventListener('click', ()=>{
    if(confirm('Reset all scores to zero?')) resetAll();
  });
  popBtn.addEventListener('click', ()=>newRound('X'));

  /* ── init ── */
  buildStars();
  buildFloaters();
  newRound('X');
  updateScores();
})();
</script>
</body>
</html>
